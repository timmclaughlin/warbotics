# wrangler.toml — Cloudflare Worker config for the Astro SSR build.
#
# Fill the placeholder IDs after provisioning:
#   1. `wrangler kv namespace create warbotics-sessions` → paste the returned id into SESSIONS.id
#   2. Create the shared AI Search namespace in the dashboard (or via `wrangler ai-search` once it lands),
#      then drop its UUID into vars.AI_SEARCH_NAMESPACE_ID.
#   3. Create a scoped API token with "Workers AI - AI Search:Edit" and store via
#      `wrangler secret put CLOUDFLARE_API_TOKEN`.

name = "warbotics"
main = "./dist/_worker.js/index.js"
account_id = "e9abbdd7b6e80b20b43abe0c39a09019"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "./dist", binding = "ASSETS" }

[observability]
enabled = true

# Public, non-secret vars. Secrets (*_SECRET, tokens) go through `wrangler secret put`.
[vars]
CLOUDFLARE_ACCOUNT_ID = "e9abbdd7b6e80b20b43abe0c39a09019"
AI_SEARCH_NAMESPACE = "warbotics"
AI_SEARCH_NAMESPACE_ID = ""

# Shared instance IDs — created by scripts/bootstrap-instances.ts.
AI_SEARCH_INSTANCE_CONTENT = "warbotics-content"
AI_SEARCH_INSTANCE_WPILIB = "wpilib-docs"

# Slack OAuth app config. SLACK_TEAM_ID locks sign-in to a single workspace.
SLACK_CLIENT_ID = "419243156871.10943866341878"
SLACK_TEAM_ID = "TCB754LRM"
SLACK_REDIRECT_URI = "https://warbotics.tim-e9a.workers.dev/api/auth/slack/callback"

# Content source — used by scripts/index-content.ts at build/deploy time.
CONTENT_REPO = "timmclaughlin/warbotics"
CONTENT_BRANCH = "main"

# KV namespace for signed session storage (one entry per logged-in user).
[[kv_namespaces]]
binding = "SESSIONS"
id = "d7d44dd8a2f6476c9a9e7402402e6e36"

# AI Search binding. The binding surface is still evolving during the open beta —
# we use the REST API in src/lib/search.ts by default, but keep the binding wired
# so switching over is a one-line change once the SDK stabilizes.
# [[ai_search_namespaces]]
# binding = "WARBOTICS_SEARCH"
# namespace_id = "REPLACE_WITH_NAMESPACE_ID"

# R2 bucket holding the WPILib docs crawled by scripts/crawl-wpilib.ts.
# Uncomment after:
#   1. Enabling R2 on the account (dashboard → R2 → Accept terms)
#   2. `npx wrangler r2 bucket create warbotics-wpilib`
# The Worker itself doesn't need the binding — uploads go via the REST API
# from the crawl script — but having it bound keeps the option open for
# future Worker-side R2 access (e.g. serving raw source pages).
# [[r2_buckets]]
# binding = "WPILIB_R2"
# bucket_name = "warbotics-wpilib"
